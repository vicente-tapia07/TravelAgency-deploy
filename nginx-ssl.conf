server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location /realms/ {
        proxy_pass http://travelagency-keycloak:8080/realms/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location /resources/ {
        proxy_pass http://travelagency-keycloak:8080/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://travelagency-nginx-backend:80/api/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://travelagency-frontend:80;
        proxy_set_header Host $host;
    }
}